version: '3.8'

services:
  # 1. Base de Datos (PostgreSQL) para Checkpointer, Estado y Piloto
  postgres:
    image: postgres:15-alpine
    container_name: digikawsay-postgres
    environment:
      POSTGRES_USER: digikawsay_app
      POSTGRES_PASSWORD: local_password_123
      POSTGRES_DB: digikawsay
    ports:
      - "5432:5432"
    volumes:
      - ./infra/db_init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digikawsay_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Weaviate (Base de Datos Vectorial)
  weaviate:
    image: semitechnologies/weaviate:1.24.4
    container_name: digikawsay-weaviate
    ports:
      - "8081:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 3. Emulador de Google Cloud Pub/Sub
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: digikawsay-pubsub
    ports:
      - "8085:8085"
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 4. Inicializador de Pub/Sub Topics
  pubsub-init:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    container_name: digikawsay-pubsub-init
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      CLOUDSDK_AUTH_DISABLE_CREDENTIALS: 1
      CLOUDSDK_CORE_PROJECT: digikawsay
    volumes:
      - ./infra/pubsub_init.sh:/scripts/pubsub_init.sh
    entrypoint: [ "bash", "-c", "sleep 5 && bash /scripts/pubsub_init.sh digikawsay" ]

  # -- Microservicios DigiKawsay (con Dockerfiles) --

  channel-layer:
    build: ./src/channel-layer
    container_name: digikawsay-channel
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    ports:
      - "8001:8080"
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: digikawsay
      PUBSUB_INBOUND_TOPIC: iap.channel.inbound
      PUBSUB_OUTBOUND_SUB: channel-outbound-sub
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATABASE_URL: postgresql://digikawsay_app:local_password_123@postgres:5432/digikawsay
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  preprocessor:
    build: ./src/preprocessor
    container_name: digikawsay-preprocessor
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: digikawsay
      WEAVIATE_URL: http://weaviate:8080
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: on-failure

  val-service:
    build: ./src/val-service
    container_name: digikawsay-val
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: digikawsay
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/val-sa-key.json
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://digikawsay_app:local_password_123@postgres:5432/digikawsay
      WEAVIATE_URL: http://weaviate:8080
    volumes:
      - ./infra/val-sa-key.json:/secrets/val-sa-key.json:ro
    restart: on-failure

  agente00-service:
    build: ./src/agente00-service
    container_name: digikawsay-agente00
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8002:8000"
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: digikawsay
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/val-sa-key.json
      DATABASE_URL: postgresql://digikawsay_app:local_password_123@postgres:5432/digikawsay
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./infra/val-sa-key.json:/secrets/val-sa-key.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  ag-05-service:
    build: ./src/ag-05-service
    container_name: digikawsay-ag05
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: digikawsay
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: on-failure

volumes:
  pgdata:
